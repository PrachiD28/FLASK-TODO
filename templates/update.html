{% extends 'base.html' %}
{% block title %}
    Update page
{% endblock %}
{% block body %}
    <div class="container my-4">
        
        
            

        <h2>Update Todo</h2>

        <form action="/update/{{ todo.SNo }}" method="POST">

            <div class="mb-3">
                <label class="form-label">Title</label>

                <input
                    type="text"
                    name="title"
                    class="form-control"
                    value="{{ todo.title }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>

                <input
                    type="text"
                    name="desc"
                    class="form-control"
                    value="{{ todo.desc }}">
            </div>

            <button class="btn btn-dark">
                Update Todo
            </button>

        </form>

    </div>

    {% endblock %}
